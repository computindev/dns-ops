# Railway deployment configuration for web app
# Uses railway.app.config.ts which targets node-server preset

[build]
# Build all workspace packages first, then build web
buildCommand = "bun install && echo 'Building web app' && bun run build --filter=@dns-ops/web"

[deploy]
# Node-server preset outputs to .output/server/index.mjs
startCommand = "node apps/web/.output/server/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
